<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Официальная страница стримерши Awwskaya. Узнайте всё о творчестве Awwyulya, расписании трансляций и эксклюзивном контенте. Awwskaya — ваше любимое сообщество стримов.">
    <title>Awwskaya | Официальная страница стримерши</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(-45deg, #ff9a00, #ff5e00, #ffc371, #ff8c00);
            background-size: 400% 400%; animation: gradient 15s ease infinite; color: white; text-align: center;
        }

        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .container { 
            background: rgba(0, 0, 0, 0.25); padding: 50px; border-radius: 40px; 
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); 
            max-width: 600px; width: 90%; transition: transform 0.3s ease;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            letter-spacing: -2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #fff;
        }

        /* Современный Liquid Neon эффект */
        h1:hover {
            transform: scale(1.1);
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.8),
                0 0 40px #ff5e00,
                0 0 80px #ff5e00;
        }

        p { font-size: 1.1rem; line-height: 1.7; opacity: 0.85; margin-bottom: 20px; }
        .player-wrapper { margin: 30px 0; }
        iframe { width: 100%; height: 400px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Awwskaya</h1>
        <p>Добро пожаловать на официальный сайт стримерши <strong>Awwskaya</strong>. Здесь вы найдете информацию о трансляциях, творческом пути и жизни <strong>Awwyulya</strong>.</p>
        
        <div class="player-wrapper">
            <iframe src="https://music.yandex.ru/iframe/album/39579396"></iframe>
        </div>

        <p><strong>Awwskaya</strong> — это уникальное стрим-сообщество. Присоединяйтесь, чтобы следить за контентом, который создает <strong>Awwyulya</strong>.</p>
    </div>

</body>
